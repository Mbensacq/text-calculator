# Publishes the static site to GitHub Pages.
#
# Requires: Settings → Pages → Source = "GitHub Actions".
#
# A single "pages" concurrency group serialises deployments so that several
# pushes in a row can no longer overlap and trigger the intermittent
# "Deployment failed, try again later" error.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html manifest.webmanifest sw.js _site/
          cp -r src styles icons _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
