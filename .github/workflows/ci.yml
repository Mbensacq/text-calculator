# Continuous integration: run the engine test suite and syntax-check every
# module on each push and pull request. Zero dependencies — the tests use only
# Node's built-ins, so this stays fast and reliable.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax-check every module
        run: |
          for f in src/*.js test/*.js sw.js; do
            node --check "$f" || exit 1
          done

      - name: Run the engine test suite
        run: node test/engine.test.js

      - name: Check asset versions are in sync (?v=N == service-worker cache)
        run: node test/version-check.js
