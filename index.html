<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Text Calculator — le bloc-notes qui calcule</title>
  <meta name="description" content="Un bloc-notes qui calcule pendant que vous écrivez : variables littérales, unités et références en avant.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%AE%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="sidebar__head">
        <span class="sidebar__title">Notes</span>
        <button id="new-note" class="icon-btn" type="button" title="Nouvelle note (Ctrl/Cmd+Entrée)" aria-label="Nouvelle note">＋</button>
      </div>
      <ul id="note-list" class="note-list"></ul>
      <div class="sidebar__foot">Calcul littéral · unités · références en avant</div>
    </aside>

    <div class="scrim" id="scrim" aria-hidden="true"></div>

    <div class="workspace">
      <header class="topbar">
        <button id="sidebar-toggle" class="icon-btn topbar__menu" type="button" aria-label="Afficher les notes">☰</button>
        <div class="brand">
          <span class="brand__mark">🧮</span>
          <span class="brand__name">Text&nbsp;Calculator</span>
        </div>
        <p class="topbar__hint">Terminez une ligne par « = » pour afficher le résultat.</p>
      </header>

      <div class="fnbar" id="fnbar" role="toolbar" aria-label="Fonctions">
        <span class="fnbar__label">ƒ</span>
        <button type="button" class="fn" data-insert="sum()" title="Somme d'une liste : sum(1, 2, 3)">somme</button>
        <button type="button" class="fn" data-insert="moy()" title="Moyenne : moy(12, 15, 9)">moy</button>
        <button type="button" class="fn" data-insert="median()" title="Médiane">médiane</button>
        <button type="button" class="fn" data-insert="min()" title="Minimum">min</button>
        <button type="button" class="fn" data-insert="max()" title="Maximum">max</button>
        <button type="button" class="fn" data-insert="sqrt()" title="Racine carrée">√</button>
        <button type="button" class="fn" data-insert="round()" title="Arrondi à l'entier">arrondi</button>
        <button type="button" class="fn" data-insert="abs()" title="Valeur absolue">|x|</button>
        <button type="button" class="fn" data-insert="si()" title="Condition : si(condition, alors, sinon)">si…</button>
      </div>

      <main class="sheet">
        <div class="editor">
          <textarea id="input" class="editor__input" spellcheck="false" autocomplete="off"
                    autocapitalize="off" autocorrect="off"
                    placeholder="Écrivez vos notes… par ex.  distance = 10 km"></textarea>
          <div id="highlight" class="editor__highlight" aria-hidden="true"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="src/units.js"></script>
  <script src="src/tokenizer.js"></script>
  <script src="src/parser.js"></script>
  <script src="src/evaluator.js"></script>
  <script src="src/formatter.js"></script>
  <script src="src/engine.js"></script>
  <script src="src/editor.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
